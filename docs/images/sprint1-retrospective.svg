  <text x="30" y="60" font-family="Arial, sans-serif" font-size="10">• WebSocket Performance</text>
  <text x="30" y="75" font-family="Arial, sans-serif" font-size="10">• Three.js Integration</text>
  <text x="30" y="90" font-family="Arial, sans-serif" font-size="10">• Multiplayer Sync</text>
  <text x="30" y="105" font-family="Arial, sans-serif" font-size="10">• 60 FPS stabil</text>
  <text x="30" y="120" font-family="Arial, sans-serif" font-size="10">• Foundation komplett</text>
  
  <!-- Challenges -->
  <rect x="180" y="20" width="140" height="120" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
