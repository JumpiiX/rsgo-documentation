  <text x="410" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976D2">Learnings</text>
  <text x="350" y="60" font-family="Arial, sans-serif" font-size="10">• 20Hz = Sweet Spot</text>
