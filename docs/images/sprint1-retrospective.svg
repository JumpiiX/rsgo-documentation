  <text x="190" y="60" font-family="Arial, sans-serif" font-size="10">• WebSocket ws/wss Bug</text>
  <text x="190" y="75" font-family="Arial, sans-serif" font-size="10">• Mouse Sensitivity</text>
  <text x="190" y="90" font-family="Arial, sans-serif" font-size="10">• Collision Detection</text>
