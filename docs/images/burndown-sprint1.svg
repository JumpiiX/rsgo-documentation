<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 16px Arial; fill: #333; }
    .axis-text { font: 12px Arial; fill: #666; }
    .grid-line { stroke: #e0e0e0; stroke-width: 1; }
    .axis-line { stroke: #333; stroke-width: 2; }
    .planned-line { stroke: #2196F3; stroke-width: 3; fill: none; }
    .actual-line { stroke: #FF6B6B; stroke-width: 3; fill: none; }
    .legend-text { font: 12px Arial; fill: #333; }
  </style>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Sprint 1 Burndown Chart (52 Story Points)</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="80" x2="80" y2="420" class="axis-line"/>
  <line x1="80" y1="420" x2="720" y2="420" class="axis-line"/>
  
  <!-- Y-axis grid -->
  <line x1="80" y1="80" x2="720" y2="80" class="grid-line"/>
  <line x1="80" y1="150" x2="720" y2="150" class="grid-line"/>
  <line x1="80" y1="220" x2="720" y2="220" class="grid-line"/>
  <line x1="80" y1="290" x2="720" y2="290" class="grid-line"/>
  <line x1="80" y1="360" x2="720" y2="360" class="grid-line"/>
  
  <!-- X-axis grid -->
  <line x1="180" y1="80" x2="180" y2="420" class="grid-line"/>
  <line x1="280" y1="80" x2="280" y2="420" class="grid-line"/>
  <line x1="380" y1="80" x2="380" y2="420" class="grid-line"/>
  <line x1="480" y1="80" x2="480" y2="420" class="grid-line"/>
  <line x1="580" y1="80" x2="580" y2="420" class="grid-line"/>
  <line x1="680" y1="80" x2="680" y2="420" class="grid-line"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="85" text-anchor="end" class="axis-text">60</text>
  <text x="70" y="155" text-anchor="end" class="axis-text">45</text>
  <text x="70" y="225" text-anchor="end" class="axis-text">35</text>
  <text x="70" y="295" text-anchor="end" class="axis-text">25</text>
  <text x="70" y="365" text-anchor="end" class="axis-text">15</text>
  <text x="70" y="425" text-anchor="end" class="axis-text">0</text>
  
  <!-- X-axis labels -->
  <text x="80" y="440" text-anchor="middle" class="axis-text">Tag 1</text>
  <text x="180" y="440" text-anchor="middle" class="axis-text">Tag 5</text>
  <text x="280" y="440" text-anchor="middle" class="axis-text">Tag 10</text>
  <text x="380" y="440" text-anchor="middle" class="axis-text">Tag 15</text>
  <text x="480" y="440" text-anchor="middle" class="axis-text">Tag 20</text>
  <text x="580" y="440" text-anchor="middle" class="axis-text">Tag 25</text>
  <text x="680" y="440" text-anchor="middle" class="axis-text">Tag 28</text>
  
  <!-- Planned line (ideal burndown) -->
  <polyline points="80,105 180,150 280,220 380,290 480,360 580,400 680,420" class="planned-line"/>
  
  <!-- Actual line -->
  <polyline points="80,105 180,125 280,195 380,275 480,340 580,385 680,420" class="actual-line"/>
  
  <!-- Data points -->
  <circle cx="80" cy="105" r="4" fill="#2196F3"/>
  <circle cx="180" cy="150" r="4" fill="#2196F3"/>
  <circle cx="280" cy="220" r="4" fill="#2196F3"/>
  <circle cx="380" cy="290" r="4" fill="#2196F3"/>
  <circle cx="480" cy="360" r="4" fill="#2196F3"/>
  <circle cx="580" cy="400" r="4" fill="#2196F3"/>
  <circle cx="680" cy="420" r="4" fill="#2196F3"/>
  
  <circle cx="80" cy="105" r="4" fill="#FF6B6B"/>
  <circle cx="180" cy="125" r="4" fill="#FF6B6B"/>
  <circle cx="280" cy="195" r="4" fill="#FF6B6B"/>
  <circle cx="380" cy="275" r="4" fill="#FF6B6B"/>
  <circle cx="480" cy="340" r="4" fill="#FF6B6B"/>
  <circle cx="580" cy="385" r="4" fill="#FF6B6B"/>
  <circle cx="680" cy="420" r="4" fill="#FF6B6B"/>
  
  <!-- Legend -->
  <line x1="550" y1="120" x2="580" y2="120" class="planned-line"/>
  <text x="590" y="125" class="legend-text">Geplant</text>
  
  <line x1="550" y1="140" x2="580" y2="140" class="actual-line"/>
  <text x="590" y="145" class="legend-text">Tatsächlich</text>
  
  <!-- Axis labels -->
  <text x="400" y="470" text-anchor="middle" class="axis-text">Tage</text>
  <text x="30" y="250" text-anchor="middle" class="axis-text" transform="rotate(-90 30 250)">Story Points</text>
</svg>