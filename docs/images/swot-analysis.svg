<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 20px Arial; fill: #333; }
    .quadrant-title { font: bold 16px Arial; fill: white; text-anchor: middle; }
    .strength-bg { fill: #4CAF50; }
    .weakness-bg { fill: #F44336; }
    .opportunity-bg { fill: #2196F3; }
    .threat-bg { fill: #FF9800; }
    .item-text { font: 12px Arial; fill: white; }
    .divider { stroke: #333; stroke-width: 3; }
  </style>
  
  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">RSGO Projekt SWOT Analyse</text>
  
  <!-- Dividers -->
  <line x1="500" y1="50" x2="500" y2="680" class="divider"/>
  <line x1="50" y1="365" x2="950" y2="365" class="divider"/>
  
  <!-- Strengths (Top Left) -->
  <rect x="50" y="50" width="450" height="315" class="strength-bg"/>
  <text x="275" y="80" class="quadrant-title">STRENGTHS (Stärken)</text>
  
  <text x="70" y="110" class="item-text">+ Rust für hohe Server-Performance</text>
  <text x="70" y="130" class="item-text">+ Memory Safety ohne Garbage Collection</text>
  <text x="70" y="150" class="item-text">+ Moderne Web-Technologien (Three.js)</text>
  <text x="70" y="170" class="item-text">+ Plattformübergreifend im Browser</text>
  <text x="70" y="190" class="item-text">+ Keine Installation erforderlich</text>
  <text x="70" y="210" class="item-text">+ Agile Entwicklung mit klaren Sprints</text>
  <text x="70" y="230" class="item-text">+ WebSocket Real-time Performance</text>
  <text x="70" y="250" class="item-text">+ Docker Container Deployment</text>
  <text x="70" y="270" class="item-text">+ Skalierbare Architektur</text>
  <text x="70" y="290" class="item-text">+ Open Source Tech Stack</text>
  <text x="70" y="310" class="item-text">+ Schnelle Iteration Cycles</text>
  <text x="70" y="330" class="item-text">+ Client-Server Authoritative Design</text>
  
  <!-- Weaknesses (Top Right) -->
  <rect x="500" y="50" width="450" height="315" class="weakness-bg"/>
  <text x="725" y="80" class="quadrant-title">WEAKNESSES (Schwächen)</text>
  
  <text x="520" y="110" class="item-text">- Begrenzte Gaming-Entwicklungs-Erfahrung</text>
  <text x="520" y="130" class="item-text">- Einzelentwickler - keine Spezialisierung</text>
  <text x="520" y="150" class="item-text">- Keine professionellen Art/Design-Skills</text>
  <text x="520" y="170" class="item-text">- Limitiertes Budget für Assets</text>
  <text x="520" y="190" class="item-text">- Keine etablierte Gaming-Community</text>
  <text x="520" y="210" class="item-text">- Browser Performance Limitierungen</text>
  <text x="520" y="230" class="item-text">- Abhängigkeit von Web-Standards</text>
  <text x="520" y="250" class="item-text">- Komplexe Multiplayer-Debugging</text>
  <text x="520" y="270" class="item-text">- Keine Marketing/Business Strategie</text>
  <text x="520" y="290" class="item-text">- Limitierte QA/Testing Resources</text>
  <text x="520" y="310" class="item-text">- Keine Audio/Sound Design Expertise</text>
  <text x="520" y="330" class="item-text">- Kein etabliertes Feedback-System</text>
  
  <!-- Opportunities (Bottom Left) -->
  <rect x="50" y="365" width="450" height="315" class="opportunity-bg"/>
  <text x="275" y="395" class="quadrant-title">OPPORTUNITIES (Chancen)</text>
  
  <text x="70" y="425" class="item-text">+ Wachsender Web-Gaming Markt</text>
  <text x="70" y="445" class="item-text">+ WebAssembly für bessere Performance</text>
  <text x="70" y="465" class="item-text">+ Mobile Browser Gaming Trend</text>
  <text x="70" y="485" class="item-text">+ Educational Gaming Content Markt</text>
  <text x="70" y="505" class="item-text">+ Remote Work = mehr Online Gaming</text>
  <text x="70" y="525" class="item-text">+ WebGPU Standard für bessere Graphics</text>
  <text x="70" y="545" class="item-text">+ Progressive Web Apps Integration</text>
  <text x="70" y="565" class="item-text">+ Cross-Platform Multiplayer Demand</text>
  <text x="70" y="585" class="item-text">+ Streaming/Content Creation Integration</text>
  <text x="70" y="605" class="item-text">+ VR/AR Browser Support kommt</text>
  <text x="70" y="625" class="item-text">+ Casual Gaming Growth</text>
  <text x="70" y="645" class="item-text">+ Open Source Community Beitrag</text>
  
  <!-- Threats (Bottom Right) -->
  <rect x="500" y="365" width="450" height="315" class="threat-bg"/>
  <text x="725" y="395" class="quadrant-title">THREATS (Bedrohungen)</text>
  
  <text x="520" y="425" class="item-text">- Konkurrenz durch native Games</text>
  <text x="520" y="445" class="item-text">- Browser Performance Limits</text>
  <text x="520" y="465" class="item-text">- Netzwerk-Latenz Probleme</text>
  <text x="520" y="485" class="item-text">- Sich ändernde Web-Standards</text>
  <text x="520" y="505" class="item-text">- Browser-Kompatibilitäts-Issues</text>
  <text x="520" y="525" class="item-text">- Security/Anti-Cheat Challenges</text>
  <text x="520" y="545" class="item-text">- Skalierungs-Kosten bei Erfolg</text>
  <text x="520" y="565" class="item-text">- Dependency auf Third-Party APIs</text>
  <text x="520" y="585" class="item-text">- Mobile Data Usage Concerns</text>
  <text x="520" y="605" class="item-text">- Ad-Blocker beeinträchtigt Performance</text>
  <text x="520" y="625" class="item-text">- Regulierung von Online Gaming</text>
  <text x="520" y="645" class="item-text">- Technology Stack Obsolescence</text>
</svg>